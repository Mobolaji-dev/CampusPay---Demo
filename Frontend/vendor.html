<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/vendor.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icons/Icon_1.png">
</head>
<body>

    <header class="app-header">
        <h1>Vendor Directory</h1>
        <button class="filter-btn"><i class="fa-solid fa-sliders"></i></button>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search by name or location...">
        </div>
    </div>

    <main id="vendor-list" class="vendor-list">
        <!-- Vendors will be loaded here dynamically -->
        <div class="loading-placeholder">Loading vendors&hellip;</div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="vendor.html" class="nav-item active">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Catalogue</span>
        </a>
        <a href="transactions.html" class="nav-item">
            <i class="fa-solid fa-receipt"></i>
            <span>Transactions</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module" src="scripts/vendor.js"></script>
    <script src="scripts/pwa.js" ></script>
</body>
</html>
