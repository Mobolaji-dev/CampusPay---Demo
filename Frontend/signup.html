<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Create Account</title>
    <link rel="stylesheet" href="styles.css/signup.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="logo">CampusPay</div>
            <div class="header-spacer"></div> </header>

        <main class="main-content">
            <h1 class="title">Create your account</h1>
            <p class="subtitle">Join us and get your virtual account provisioned instantly.</p>

            <form class="signup-form">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com">
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <div class="country-code">
                            <span class="flag">🇳🇬</span>
                            <span class="code-text">+234</span>
                        </div>
                        <input type="tel" id="phone" placeholder="801 234 5678">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" placeholder="Min. 8 characters">
                        <button type="button" class="toggle-password" aria-label="Show password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="security-badge">
                <svg width="60" height="70" viewBox="0 0 24 24" fill="none" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <circle cx="12" cy="11" r="3"></circle>
                </svg>
            </div>

            <p class="login-prompt">
                Already have an account? <a href="login.html">Log in.</a>
            </p>
        </main>
    </div>
</body>
</html>
