<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Create Account</title>
    <link rel="stylesheet" href="styles/signup.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icons/icon_1.png">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button onclick="window.history.back()" class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="logo">CampusPay</div>
            <div class="header-spacer"></div> </header>

        <main class="main-content">
            <h1 class="title">Create your account</h1>
            <p class="subtitle">Join us and get your virtual account provisioned instantly.</p>

            <form id="signup-form" class="signup-form">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <div class="country-code">
                            <span class="flag">🇳🇬</span>
                            <span class="code-text">+234</span>
                        </div>
                        <input type="tel" id="phone" placeholder="801 234 5678" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="accountType">Account Type</label>
                    <div class="select-wrapper">
                        <select id="accountType" required>
                            <option value="" disabled selected>Select your account type</option>
                            <option value="student">Student</option>
                            <option value="vendor">Vendor</option>
                        </select>
                        <!-- Custom arrow to match the SVG icon aesthetic of your existing form -->
                        <div class="select-arrow">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="signup-password" placeholder="Min. 8 characters" required>
                        <button type="button" class="toggle-password" aria-label="Show password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button id="signup-btn" type="submit" class="btn signup-btn">
                  <span class="btn-text">Create Account</span>
                  <span class="spinner"></span>
                </button>
            </form>

            <div class="security-badge">
                <svg width="60" height="70" viewBox="0 0 24 24" fill="none" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <circle cx="12" cy="11" r="3"></circle>
                </svg>
            </div>

            <p class="login-prompt">
                Already have an account? <a href="index.html">Log in.</a>
            </p>
        </main>
    </div>

    <div id="popup-error" class="popup-overlay">
      <div class="popup-content">
        <div class="popup-icon error-icon">&#9888;</div>
        <h3 class="popup-title">SignUp Failed</h3>
        <p class="popup-text" id="error-message">Ensure password is up to 8 characters</p>
        
      </div>
    </div>  

    <script src="scripts/pwa.js" ></script>
    <script src="scripts/signup.js" ></script>
    <script type="module" src="scripts/auth.js" defer></script>
</body>
</html>
