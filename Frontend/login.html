<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Log In</title>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="logo">CampusPay</div>
            <div class="header-spacer"></div>
        </header>

        <div class="main-content">
            <h1 class="title">Welcome back</h1>
            <p class="subtitle">Sign in to manage your campus payments and track your student spending effortlessly.</p>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="login-email" placeholder="e.g. alex.smith@campus.edu" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" placeholder="........" required>
                        <button type="button" class="toggle-password" aria-label="Show password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>


                <button type="submit" class="btn submit-btn" id="login-btn">
                  <span class="btn-text">Log In</span>
                  <span class="spinner"></span>
                </button>
            </form>

            

            <div class="divider">
                <span>OR CONTINUE WITH</span>
            </div>

            <div id="popup-error" class="popup-overlay">
              <div class="popup-content">
                <div class="popup-icon error-icon">&#9888;</div>
                  <h3 class="popup-title">Login Failed</h3>
                  <p class="popup-text" id="error-message">Invalid email or password. Please try again.</p>
                </div>
              </div>
            </div>  

            <div class="signup-prompt-container">
                <p class="signup-prompt">
                    Don't have an account? <a href="signup.html">Sign up.</a>
                </p>
            </div>
        </main>
    </div>

    <script type="module" src="scripts/auth.js" ></script>
</body>
</html>
