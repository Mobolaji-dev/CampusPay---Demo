<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Log In</title>
    <link rel="stylesheet" href="styles.css/login.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="logo">CampusPay</div>
            <div class="header-spacer"></div>
        </header>

        <main class="main-content">
            <h1 class="title">Welcome back</h1>
            <p class="subtitle">Sign in to manage your campus payments and track your student spending effortlessly.</p>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. alex.smith@campus.edu">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" value="........">
                        <button type="button" class="toggle-password" aria-label="Show password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">Log In</button>
            </form>

            <div class="divider">
                <span>OR CONTINUE WITH</span>
            </div>

            <div class="social-login-group">
                <button type="button" class="social-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="social-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16.365 7.188c-1.353.018-2.607-.811-3.266-1.98-.797-1.341-.585-3.136.425-4.225.861-.926 2.062-1.442 3.285-1.42 1.394-.038 2.686.822 3.325 2.036.782 1.344.529 3.093-.45 4.167-.847.925-2.033 1.458-3.319 1.422zm-1.897 1.353c-1.576-.044-3.095.918-3.832 2.453-1.547 3.036-.579 7.377 1.258 9.943.91 1.294 2.03 2.748 3.513 2.695 1.436-.05 1.986-.889 3.655-.889 1.67 0 2.158.889 3.674.863 1.516-.027 2.476-1.303 3.364-2.58 1.026-1.523 1.446-2.993 1.472-3.072-.033-.016-2.871-1.077-2.909-4.32-.033-2.7 2.247-4.004 2.355-4.062-1.282-1.848-3.283-2.083-3.992-2.128-1.745-.166-3.415 1.009-4.28 1.009-.863 0-2.222-1.006-3.69-1.006-.2 0-.395.031-.588.094z" fill="#000000"/>
                    </svg>
                    Apple
                </button>
            </div>

            <div class="signup-prompt-container">
                <p class="signup-prompt">
                    Don't have an account? <a href="#">Sign up.</a>
                </p>
            </div>
        </main>
    </div>
</body>
</html>
