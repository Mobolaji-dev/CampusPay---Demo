<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Setup - Set PIN</title>
    <link rel="stylesheet" href="styles/pin.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h1 class="header-title">Security Setup</h1>
            <div class="header-spacer"></div>
        </header>

        <main class="pin-display-section">
            <div class="icon-circle">
                <svg class="shield-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <svg class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2 class="title">Set your PIN</h2>
            <p class="subtitle">Create a 4-digit PIN to secure your transactions and account access.</p>

            <div class="pin-boxes">
                <div class="pin-box"></div>
                <div class="pin-box"></div>
                <div class="pin-box"></div>
                <div class="pin-box"></div>
            </div>
        </main>

        <section class="keypad-section">
            <div class="keypad-grid">
                <button class="key">1</button>
                <button class="key">2</button>
                <button class="key">3</button>
                
                <button class="key">4</button>
                <button class="key">5</button>
                <button class="key">6</button>
                
                <button class="key">7</button>
                <button class="key">8</button>
                <button class="key">9</button>
                
                <div class="key-spacer"></div>
                <button class="key">0</button>
                <button class="key backspace-key" aria-label="Backspace">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                        <line x1="18" y1="9" x2="12" y2="15"></line>
                        <line x1="12" y1="9" x2="18" y2="15"></line>
                    </svg>
                </button>
            </div>

            <div class="action-container">
                <button class="set-pin-btn" disabled>Set PIN</button>
            </div>
        </section>
    </div>
</body>
</html>
