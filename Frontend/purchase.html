<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Complete Purchase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/purchase.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icons/Icon_1.png">
</head>
<body>

    <header class="top-header">
        <div class="header-content">
            <button onclick="window.history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <h1>Complete Purchase</h1>
            <div class="spacer"></div>
        </div>
    </header>

    <form id="checkout-form" class="checkout-form">
        <main class="checkout-container">
            <section class="checkout-section">
                <h2 class="section-label">Order Summary</h2>
                <div class="summary-card">
                    <div class="summary-head">
                        <div class="summary-icon">
                            <i class="fa-solid fa-box-open"></i>
                        </div>
                        <div class="summary-copy">
                            <p class="summary-label">Product</p>
                            <h2 id="product-name">Loading product...</h2>
                            <p id="product-desc" class="product-desc">A short description of the selected item will appear here.</p>
                        </div>
                    </div>

                    <div class="divider solid"></div>

                    <div class="cost-row">
                        <span>Base Price</span>
                        <span id="base-price">₦0</span>
                    </div>
                    <div class="cost-row">
                        <span>Service Charge</span>
                        <span>₦20</span>
                    </div>

                    <div class="divider dashed"></div>
                    <div class="cost-row total-row">
                        <span class="total-label">Total Amount</span>
                        <span id="total-price" class="total-value">₦0</span>
                    </div>
                </div>
                <p id="order-context" class="order-context"></p>
            </section>

            <section class="checkout-section">
                <h2 class="section-label">Security Verification</h2>
                <p class="security-instructions">Enter your 4-digit Transaction PIN to authorize this payment.</p>
                <div class="form-group">
                    <label for="transaction-pin">Transaction PIN</label>
                    <input id="transaction-pin" name="pin" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" autocomplete="one-time-code" placeholder="••••" required>
                </div>
                <p id="checkout-error" class="field-error"></p>
            </section>

            <button type="submit" id="confirm-payment" class="btn-confirm">
                <i class="fa-solid fa-lock"></i> Confirm Payment
            </button>
        </main>
    </form>

    <script type="module" src="scripts/purchase.js"></script>
    <script src="scripts/pwa.js"></script>

</body>
</html>
