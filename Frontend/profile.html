<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/profile.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="/icons/Icon_1.png">
</head>
<body>

  <div class="app-container">
    
    <header class="top-nav">
      <button onclick="window.history.back()" class="icon-btn back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
    </header>

    <main class="content">
      
      <section class="profile-header">
        <div class="avatar-wrapper">
          <img src="https://media.istockphoto.com/id/2254757383/vector/vector-flat-illustration-in-grayscale-avatar-user-profile-person-icon-gender-neutral.webp?a=1&b=1&s=612x612&w=0&k=20&c=eip6OR5fLUp6fzctzGXiy1zKD9ThWieXVk7db2mtJUI=" alt="Avatar-img" class="avatar-img">
          <div class="status-badge"></div>
        </div>
        <h1 id="profile-name" class="profile-name">Full Name</h1>
        <p class="profile-status">Verified Student</p>
      </section>

      <section class="contact-section">
        <h2 class="section-title">CONTACT INFORMATION</h2>
        
        <div class="info-group">
          <p class="info-label">Email</p>
          <p id="email"  class="info-value">name@gmail.com</p>
        </div>
        
        <hr class="divider">
        
        <div class="info-group">
          <p class="info-label">Phone Number</p>
          <p id="phone" class="info-value">+234 812 345 6789</p>
        </div>

        <hr class="divider">

        <div class="info-group">
          <p class="info-label">Role</p>
          <p id="role" class="info-value">---------</p>
        </div>
      </section>

      <section class="menu-list">
        
        
        <hr class="divider">
        
        <a href="pin.html" class="menu-item">
          <div class="menu-item-left">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="#003BCC" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            <span class="menu-text">Set Transaction Pin</span>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </a>
        
        <hr class="divider">
      </section>

      <section class="actions-section">
        <button id="logout-btn" class="btn btn-logout">
          <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Log Out
        </button>
      </section>

    </main>

        <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="vendor.html" class="nav-item">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Catalogue</span>
        </a>
        <a href="transactions.html" class="nav-item">
            <i class="fa-solid fa-receipt"></i>
            <span>Transactions</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>
  </div>

  </div>

  <script src="scripts/pwa.js" ></script>
  <script type="module" src="scripts/profile.js"></script>
</body>
</html>
