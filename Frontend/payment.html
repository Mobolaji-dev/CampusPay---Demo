<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/payment.css">
</head>
<body>

    <main class="success-container">
        <h1 class="app-logo">CampusPay</h1>

        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h2 class="title">Payment Successful</h2>
        <p class="subtitle">Your transaction has been processed and your account balance updated.</p>

        <section class="receipt-card">
            <div class="amount-header">
                <p>AMOUNT PAID</p>
                <div class="amount-value">₦15,020.00</div>
            </div>
            
            <hr class="divider">

            <div class="receipt-details">
                <div class="row">
                    <span class="label">Transaction ID</span>
                    <span class="value">CP 9920384751</span>
                </div>
                <div class="row">
                    <span class="label">Date</span>
                    <span class="value">Oct 24, 2023</span>
                </div>
                <div class="row">
                    <span class="label">Time</span>
                    <span class="value">14:45 PM</span>
                </div>
                <div class="row">
                    <span class="label">Payment Method</span>
                    <span class="value"><i class="fa-solid fa-wallet"></i> Student Wallet</span>
                </div>
            </div>
        </section>


        <div class="action-buttons">
            <button class="btn-secondary">Verify Transaction</button>
            <button class="btn-primary">Continue</button>
        </div>
    </main>

</body>
</html>
