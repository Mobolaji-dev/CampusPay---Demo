<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPay - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/catalogue.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icons/Icon_1.png">
</head>
<body>

    <header class="app-header">
        <button class="icon-btn"><i class="fa-solid fa-bars"></i></button>
        <h1 class="logo">CampusPay</h1>
        <button class="icon-btn"><i class="fa-regular fa-circle-user"></i></button>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search products, books, or services...">
        </div>
    </div>
    <!-- Vendor header populated dynamically when opening a vendor catalogue -->
    <section id="vendor-header" class="vendor-header" aria-live="polite">
        <!-- Filled by script -->
    </section>

    <main id="product-grid" class="product-grid">
        <div class="loading-placeholder">Select a vendor to view their catalogue or load via vendor page.</div>
    </main>

    <div class="load-more-container">
        <button class="btn-load-more">Load More</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="vendor.html" class="nav-item active">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Catalogue</span>
        </a>
        <a href="transactions.html" class="nav-item">
            <i class="fa-solid fa-receipt"></i>
            <span>Transactions</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>
  </div>

  <script type="module" src="scripts/catalogue.js"></script>
  <script src="scripts/pwa.js" ></script>

</body>
</html>
