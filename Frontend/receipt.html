<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Details</title>
  <link rel="stylesheet" href="styles.css/receipt.css">
</head>
<body>

  <div class="app-container">
    
    <header class="top-nav">
      <button class="icon-btn back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="page-title">Receipt</h1>
      <button class="text-btn cancel-btn">Cancel</button>
    </header>

    <main class="content">
      
      <div class="status-container">
        <div class="status-badge">
          <span class="status-dot"></span> PENDING
        </div>
      </div>

      <section class="qr-card">
        <div class="qr-wrapper">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Placeholder" alt="QR Code" class="qr-img">
        </div>
        <h2 class="qr-title">SCAN TO VERIFY</h2>
        <p class="qr-desc">Show this code to the merchant to confirm delivery.</p>
      </section>

      <section class="details-section">
        <div class="detail-row">
          <p class="label">ITEM DESCRIPTION</p>
          <p class="value bold-value">MacBook Air M2 (Escrow Payment)</p>
        </div>
        
        <hr class="divider">
        
        <div class="detail-row flex-row">
          <div>
            <p class="label">ITEM AMOUNT</p>
            <p class="value amount-value">&#8358;450,000</p>
          </div>
          <div class="lock-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#71717A">
              <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
              <path d="M8 11V7a4 4 0 118 0v4"></path>
            </svg>
          </div>
        </div>

        <hr class="divider">
      </section>

      <section class="info-section">
        
        <div class="timer-card">
          <div class="timer-left">
            <svg class="hourglass-icon" viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2">
              <path d="M4 4h16c-.5 2.5-2 5-6 8 4 3 5.5 5.5 6 8H4c.5-2.5 2-5 6-8-4-3-5.5-5.5-6-8z"></path>
            </svg>
            <div>
              <p class="label">EXPIRING IN</p>
              <p class="value highlight-time">23:53:13</p>
            </div>
          </div>
          <div class="timer-right">
            <p class="label">EST. DATE</p>
            <p class="value dark-value">Oct 24, 2023</p>
          </div>
        </div>

        <div class="row-cards">
          <div class="small-card">
            <p class="label">TXN ID</p>
            <p class="value dark-value">ESC-8923-X92L</p>
          </div>
          <div class="small-card">
            <p class="label">METHOD</p>
            <p class="value dark-value">Wallet Balance</p>
          </div>
        </div>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        <span>Catalog</span>
      </button>
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Transactions</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

</body>
</html>
