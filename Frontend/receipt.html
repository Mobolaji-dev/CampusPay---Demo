<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/receipt.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="/icons/icon-1.png">
</head>
<body>

  <div class="app-container">
    
    <header class="top-nav">
      <button onclick="window.history.back()" class="icon-btn back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="page-title">Receipt</h1>
      <button class="text-btn cancel-btn">Cancel</button>
    </header>

    <main class="content">
      
      <div class="status-container">
        <div class="status-badge">
          <span class="status-dot"></span> PENDING
        </div>
      </div>

      <section class="qr-card">
        <div class="qr-wrapper">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Placeholder" alt="QR Code" class="qr-img">
        </div>
        <h2 class="qr-title">SCAN TO VERIFY</h2>
        <p class="qr-desc">Show this code to the merchant to confirm delivery.</p>
      </section>

      <section class="details-section">
        <div class="detail-row">
          <p class="label">ITEM DESCRIPTION</p>
          <p class="value bold-value">MacBook Air M2 (Escrow Payment)</p>
        </div>
        
        <hr class="divider">
        
        <div class="detail-row flex-row">
          <div>
            <p class="label">ITEM AMOUNT</p>
            <p class="value amount-value">&#8358;450,000</p>
          </div>
          <div class="lock-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#71717A">
              <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
              <path d="M8 11V7a4 4 0 118 0v4"></path>
            </svg>
          </div>
        </div>

        <hr class="divider">
      </section>

      <section class="info-section">
        
        <div class="timer-card">
          <div class="timer-left">
            <svg class="hourglass-icon" viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2">
              <path d="M4 4h16c-.5 2.5-2 5-6 8 4 3 5.5 5.5 6 8H4c.5-2.5 2-5 6-8-4-3-5.5-5.5-6-8z"></path>
            </svg>
            <div>
              <p class="label">EXPIRING IN</p>
              <p class="value highlight-time">23:53:13</p>
            </div>
          </div>
          <div class="timer-right">
            <p class="label">EST. DATE</p>
            <p class="value dark-value">Oct 24, 2023</p>
          </div>
        </div>

        <div class="row-cards">
          <div class="small-card">
            <p class="label">TXN ID</p>
            <p class="value dark-value">ESC-8923-X92L</p>
          </div>
          <div class="small-card">
            <p class="label">METHOD</p>
            <p class="value dark-value">Wallet Balance</p>
          </div>
        </div>
      </section>

    </main>

        <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="vendor.html" class="nav-item">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Catalogue</span>
        </a>
        <a href="transactions.html" class="nav-item active">
            <i class="fa-solid fa-receipt"></i>
            <span>Transactions</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>
  </div>
  </div>

  <script src="scripts/pwa.js" ></script>
</body>
</html>
