<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/transactions.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="/icons/Icon_1.png">
</head>
<body>

  <div class="app-container">
    
    <header class="top-nav">
      <button onclick="window.history.back()" class="icon-btn back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1 class="page-title">Transaction History</h1>
      <div style="width: 24px;"></div>
    </header>

    <main class="content">
      <div class="filter-tabs" role="tablist">
        <button class="tab active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="tab" data-filter="in" role="tab" aria-selected="false">Income</button>
        <button class="tab" data-filter="out" role="tab" aria-selected="false">Expenses</button>
      </div>

      <section id="transaction-list" class="transaction-list" aria-live="polite">
        <div class="empty-state">
          <p class="empty-title">Loading your transaction history…</p>
          <p class="empty-subtitle">Please wait while we fetch your latest activity.</p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="vendor.html" class="nav-item">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Catalogue</span>
        </a>
        <a href="transactions.html" class="nav-item active">
            <i class="fa-solid fa-receipt"></i>
            <span>Transactions</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>
  </div>


  <script type="module" src="scripts/transactions.js"></script>
  <script src="scripts/pwa.js" ></script>

</body>
</html>
