<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History</title>
  <link rel="stylesheet" href="styles.css/transactions.css">
</head>
<body>

  <div class="app-container">
    
    <header class="top-nav">
      <button class="icon-btn back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1 class="page-title">Transaction History</h1>
      <div style="width: 24px;"></div>
    </header>

    <main class="content">
      
      <div class="filter-tabs">
        <button class="tab active">All</button>
        <button class="tab">Income</button>
        <button class="tab">Expenses</button>
      </div>

      <section class="date-group">
        <h2 class="date-header">TODAY</h2>
        
        <article class="transaction-card">
          <div class="icon-box bg-blue-light">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
          </div>
          <div class="card-details">
            <h3 class="item-title">MacBook Air M2</h3>
            <p class="item-category">Electronics &bull; 14:20</p>
          </div>
          <div class="card-amounts">
            <p class="amount negative">-&#8358;450,000</p>
            <span class="badge badge-purple">COMPLETED</span>
          </div>
        </article>

        <article class="transaction-card">
          <div class="icon-box bg-green-light">
            <svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg>
          </div>
          <div class="card-details">
            <h3 class="item-title">Funds Deposit</h3>
            <p class="item-category">Credit &bull; 09:15</p>
          </div>
          <div class="card-amounts">
            <p class="amount positive">+&#8358;50,000</p>
            <span class="badge badge-green">COMPLETED</span>
          </div>
        </article>
      </section>

      <section class="date-group">
        <h2 class="date-header">YESTERDAY</h2>
        
        <article class="transaction-card">
          <div class="icon-box bg-blue-light">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2"><path d="M20.38 3.46L16 2a8 8 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
          </div>
          <div class="card-details">
            <h3 class="item-title">Campus Varsity Hoodie</h3>
            <p class="item-category">Fashion &bull; 18:45</p>
          </div>
          <div class="card-amounts">
            <p class="amount negative">-&#8358;18,000</p>
            <span class="badge badge-purple">COMPLETED</span>
          </div>
        </article>
      </section>

      <section class="date-group">
        <h2 class="date-header">OCT 23</h2>
        
        <article class="transaction-card">
          <div class="icon-box bg-blue-light">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
          </div>
          <div class="card-details">
            <h3 class="item-title">Organic Chemistry Vol 2</h3>
            <p class="item-category">Education &bull; 11:30</p>
          </div>
          <div class="card-amounts">
            <p class="amount negative">-&#8358;12,500</p>
            <span class="badge badge-orange">PROCESSING</span>
          </div>
        </article>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        <span>Catalog</span>
      </button>
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Transactions</span>
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

</body>
</html>
